<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Source Serif 4', 'Noto Serif', serif; }
        .a-enter-vr { display: none !important; }

        /* WELCOME SCREEN */
        #welcome-screen {
            position: fixed; inset: 0; background: #f4efea; z-index: 10005;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center; color: #603b18;
            transition: opacity 0.5s ease;
        }
        #welcome-title { font-family: 'Noto Serif', serif; font-size: 26px; font-weight: bold; color: #8c3b23; margin-bottom: 20px; }
        #welcome-text { font-size: 18px; line-height: 1.6; max-width: 400px; margin-bottom: 40px; }
        #start-btn {
            background: #8c3b23; color: #f4efea; font-family: 'Noto Serif', serif;
            font-size: 16px; font-weight: bold; padding: 15px 40px; border: none;
            border-radius: 30px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(140, 59, 35, 0.4); margin-top: auto; margin-bottom: 30px;
        }

        /* CENTERED SWIPE TOAST */
        #swipe-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(96, 59, 24, 0.95); color: #f4efea; padding: 15px 30px;
            border-radius: 30px; z-index: 1002; font-family: 'Noto Serif', serif; font-size: 18px;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; text-align: center; white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* MINIMALIST RIGHT-ALIGNED MENU (No Cross Button) */
        #right-menu {
            position: fixed; top: 50%; right: 20px; transform: translateY(-50%);
            background: rgba(244, 239, 234, 0.95); /* Light Beige */
            border: 2px solid #8c3b23; border-radius: 16px;
            padding: 20px 15px; z-index: 1004;
            display: none; flex-direction: column; align-items: center; gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            opacity: 0; transition: opacity 0.3s ease;
        }
        
        .links-container {
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        .menu-link {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            text-decoration: none; color: #603b18; font-family: 'Noto Serif', serif;
            font-size: 11px; font-weight: bold; text-align: center;
        }
        .menu-link svg { width: 32px; height: 32px; fill: #8c3b23; transition: transform 0.2s; }
        .menu-link:active svg { transform: scale(0.9); }

        /* EXISTING AR STYLES */
        #top-title-bar {
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(96, 59, 24, 0.95); 
            color: #f4efea; text-align: center; padding: 15px 0; font-family: 'Noto Serif', serif; 
            font-size: 18px; font-weight: bold; letter-spacing: 1px; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none; 
        }
        #ar-ui-layer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; display: none; flex-direction: column; z-index: 1000;
        }
        #info-wrapper { background: #f4efea; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.25); border: 2px solid #8c3b23; margin-bottom: 10px; display: none; }
        #info-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px 20px; }
        #info-title { color: #8c3b23; font-weight: bold; font-family: 'Noto Serif', serif; font-size: 20px; margin: 0; }
        #close-btn { color: #8c3b23; font-size: 16px; font-weight: bold; cursor: pointer; font-family: sans-serif; line-height: 1; margin: 0; }
        #info-content { padding: 0px 20px 20px 20px; color: #603b18; font-size: 16px; line-height: 1.5; }
        #tab-group { display: flex; background: #7a5c3a; padding: 8px; border-radius: 12px; border: 1px solid #603b18; transition: border-radius 0.2s; }
        .tab-button { flex: 1; padding: 12px 5px; border: none; background: transparent; color: #f4efea; font-family: 'Noto Serif', serif; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; letter-spacing: 0.5px; }
        .active-tab { background: #8c3b23; color: #f4efea; border-radius: 6px; }
        
        #loading { position: fixed; inset: 0; background: #603b18; display: flex; justify-content: center; align-items: center; color: #f4efea; z-index: 10010; font-family: 'Noto Serif', serif; font-weight: bold; font-size: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="loading">ARCHIVE INITIALIZING...</div>

    <div id="welcome-screen">
        <div style="margin-top: auto;">
            <div id="welcome-title">MIDF DIGITAL ARCHIVE</div>
            <div id="welcome-text">
                Welcome to the interactive AR experience.<br><br>
                Please ensure you are in a well-lit area. Point your camera directly at the manuscript to reveal its historical data and AI translations.
            </div>
        </div>
        <button id="start-btn" onclick="startScanner()">Scan Manuscript</button>
    </div>

    <div id="swipe-toast">← Swipe left for links</div>

    <div id="right-menu">
        <div style="color: #8c3b23; font-weight: bold; font-family: 'Noto Serif', serif; font-size: 16px;">Connect</div>
        <div class="links-container">
            <a href="https://midf.org.in/" target="_blank" class="menu-link">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Website
            </a>
            <a href="https://www.linkedin.com/company/midf-india/" target="_blank" class="menu-link">
                <svg viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
                LinkedIn
            </a>
            <a href="https://x.com/midf_org" target="_blank" class="menu-link">
                <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                X
            </a>
        </div>
    </div>

    <div id="top-title-bar">PAPER MANUSCRIPT</div>

    <div id="ar-ui-layer">
        <div id="info-wrapper">
            <div id="info-header">
                <div id="info-title"></div>
                <div id="close-btn" onclick="closeTab()">&#10005;</div>
            </div>
            <div id="info-content"></div>
        </div>
        
        <div id="tab-group">
            <button id="btn-summary" class="tab-button" onclick="setTab('summary')">AI Summary</button>
            <button id="btn-info" class="tab-button" onclick="setTab('info')">Information</button>
            <button id="btn-trans" class="tab-button" onclick="setTab('trans')">Translation</button>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-plane position="0 0 0" width="1.1" height="0.8" material="color: #8c3b23; opacity: 0.3; transparent: true"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        const contentData = {
            summary: { title: "AI SUMMARY", body: "Confirms a donation by King Bappa to Brahmins in Apitti. The grant includes land rights and local serfs, ensuring continuity of religious services." },
            info: { title: "TECHNICAL DATA", body: "• <strong style='color:#603b18;'>Artifact:</strong> Copper Plate<br>• <strong style='color:#603b18;'>Dynasty:</strong> Pallava<br>• <strong style='color:#603b18;'>Era:</strong> 4th Century CE<br>• <strong style='color:#603b18;'>Region:</strong> Kanchipuram" },
            trans: { title: "EPIGRAPHIC TEXT", body: "'Success ! From Kāmchīpura-the righteous supreme king of great kings of the Pallavas Sivakhaṁdavama (Śivaskandavarman), a Bhâraddāya (Bhāradvāja) an offerer of Agnishṭoma, Vajapeya and Aśvamedha (sacrifices) [issues the following orders]: <br>[We send greeting]' to our lords of provinces, vatthas, royal princes, generals, rulers of districts, custom-house officers, prefects of countries and others, to the freeholders of various villages, to herdsmen, cowherds, ministers, foresters, gumikas, túthikas, neyikas, and all others employed in our service.'" }
        };

        const uiLayer = document.querySelector('#ar-ui-layer');
        const topBar = document.querySelector('#top-title-bar');
        const infoWrapper = document.querySelector('#info-wrapper');
        const titleBox = document.querySelector('#info-title');
        const box = document.querySelector('#info-content');
        const target = document.querySelector('#ar-target');
        const welcomeScreen = document.querySelector('#welcome-screen');
        const swipeToast = document.querySelector('#swipe-toast');
        const rightMenu = document.querySelector('#right-menu');

        window.addEventListener("load", () => { document.querySelector('#loading').style.display = 'none'; });

        function startScanner() {
            welcomeScreen.style.opacity = '0';
            setTimeout(() => { 
                welcomeScreen.style.display = 'none'; 
                swipeToast.style.opacity = '1';
                setTimeout(() => { swipeToast.style.opacity = '0'; }, 3500); 
            }, 500);
        }

        target.addEventListener("targetFound", () => { uiLayer.style.display = 'flex'; topBar.style.display = 'block'; });
        target.addEventListener("targetLost", () => { uiLayer.style.display = 'none'; topBar.style.display = 'none'; closeTab(); hideMenu(); });

        function setTab(id) {
            infoWrapper.style.display = 'block';
            titleBox.innerHTML = contentData[id].title;
            box.innerHTML = contentData[id].body;
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('btn-' + id).classList.add('active-tab');
        }

        function closeTab() {
            infoWrapper.style.display = 'none';
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active-tab'));
        }

        // SWIPE & TAP GESTURE LOGIC
        let touchstartX = 0; let touchstartY = 0;
        let touchendX = 0; let touchendY = 0;

        // Detect touch start (Used for swiping and tapping outside)
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;

            // If the right menu is open, and the user taps anywhere OUTSIDE the right menu, close it
            if (rightMenu.style.display === 'flex' && !rightMenu.contains(e.target)) {
                hideMenu();
            }
        });

        // Also add click listener for desktop testing support
        document.addEventListener('click', e => {
            if (rightMenu.style.display === 'flex' && !rightMenu.contains(e.target)) {
                hideMenu();
            }
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            touchendY = e.changedTouches[0].screenY;
            handleSwipe();
        });

        function handleSwipe() {
            let xDiff = touchstartX - touchendX;
            let yDiff = touchstartY - touchendY;

            if (Math.abs(xDiff) > Math.abs(yDiff) && Math.abs(xDiff) > 60) {
                if (xDiff > 0) { showMenu(); } // Swiped Left
                else { hideMenu(); } // Swiped Right
            }
        }

        function showMenu() {
            rightMenu.style.display = 'flex';
            setTimeout(() => { rightMenu.style.opacity = '1'; }, 10);
        }

        function hideMenu() {
            rightMenu.style.opacity = '0';
            setTimeout(() => { rightMenu.style.display = 'none'; }, 300);
        }
    </script>
</body>
</html>
