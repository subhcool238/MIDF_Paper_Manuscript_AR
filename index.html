<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Source Serif 4', 'Noto Serif', serif; }
        .a-enter-vr { display: none !important; }

        /* WELCOME SCREEN */
        #welcome-screen {
            position: fixed; inset: 0; background: #f4efea; z-index: 10005;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center; color: #603b18;
            transition: opacity 0.5s ease;
        }
        #welcome-title { font-family: 'Noto Serif', serif; font-size: 26px; font-weight: bold; color: #8c3b23; margin-bottom: 20px; }
        #welcome-text { font-size: 18px; line-height: 1.6; max-width: 400px; margin-bottom: 40px; }
        #start-btn {
            background: #8c3b23; color: #f4efea; font-family: 'Noto Serif', serif;
            font-size: 16px; font-weight: bold; padding: 15px 40px; border: none;
            border-radius: 30px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(140, 59, 35, 0.4); margin-top: auto; margin-bottom: 30px;
        }

        /* CENTERED SWIPE TOAST */
        #swipe-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(96, 59, 24, 0.95); color: #f4efea; padding: 15px 30px;
            border-radius: 30px; z-index: 1002; font-family: 'Noto Serif', serif; font-size: 18px;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; text-align: center; white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* MINIMALIST RIGHT-ALIGNED MENU */
        #right-menu {
            position: fixed; top: 50%; right: 20px; transform: translateY(-50%);
            background: rgba(244, 239, 234, 0.95); 
            border: 2px solid #8c3b23; border-radius: 16px;
            padding: 20px 15px; z-index: 1004;
            display: none; flex-direction: column; align-items: center; gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            opacity: 0; transition: opacity 0.3s ease;
        }
        
        .links-container {
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        .menu-link {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            text-decoration: none; color: #603b18; font-family: 'Noto Serif', serif;
            font-size: 11px; font-weight: bold; text-align: center;
        }
        .menu-link svg { width: 32px; height: 32px; fill: #8c3b23; transition: transform 0.2s; }
        .menu-link:active svg { transform: scale(0.9); }

        /* AR UI STYLES */
        #top-title-bar {
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(96, 59, 24, 0.95); 
            color: #f4efea; text-align: center; padding: 15px 0; font-family: 'Noto Serif', serif; 
            font-size: 18px; font-weight: bold; letter-spacing: 1px; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none; 
        }
        #ar-ui-layer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; display: none; flex-direction: column; z-index: 1000;
        }
        #info-wrapper { background: #f4efea; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.25); border: 2px solid #8c3b23; margin-bottom: 10px; display: none; 
            /* Added max-height and scrolling for long text */
            max-height: 50vh; overflow-y: auto; overflow-x: hidden;
        }
        #info-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px 20px; position: sticky; top: 0; background: #f4efea; z-index: 10; border-radius: 12px 12px 0 0; }
        #info-title { color: #8c3b23; font-weight: bold; font-family: 'Noto Serif', serif; font-size: 20px; margin: 0; text-transform: uppercase; }
        #close-btn { color: #8c3b23; font-size: 16px; font-weight: bold; cursor: pointer; font-family: sans-serif; line-height: 1; margin: 0; padding-left: 15px;}
        #info-content { padding: 0px 20px 20px 20px; color: #603b18; font-size: 16px; line-height: 1.5; }
        #tab-group { display: flex; background: #7a5c3a; padding: 8px; border-radius: 12px; border: 1px solid #603b18; transition: border-radius 0.2s; }
        .tab-button { flex: 1; padding: 12px 5px; border: none; background: transparent; color: #f4efea; font-family: 'Noto Serif', serif; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; letter-spacing: 0.5px; }
        .active-tab { background: #8c3b23; color: #f4efea; border-radius: 6px; }
        
        #loading { position: fixed; inset: 0; background: #603b18; display: flex; justify-content: center; align-items: center; color: #f4efea; z-index: 10010; font-family: 'Noto Serif', serif; font-weight: bold; font-size: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="loading">ARCHIVE INITIALIZING...</div>

    <div id="welcome-screen">
        <div style="margin-top: auto;">
            <div id="welcome-title">MIDF DIGITAL ARCHIVE</div>
            <div id="welcome-text">
                Welcome to the interactive AR experience.<br><br>
                Please ensure you are in a well-lit area. Point your camera directly at the manuscript to reveal its historical data and translations.
            </div>
        </div>
        <button id="start-btn" onclick="startScanner()">Scan Manuscript</button>
    </div>

    <div id="swipe-toast">← Swipe left for links</div>

    <div id="right-menu">
        <div style="color: #8c3b23; font-weight: bold; font-family: 'Noto Serif', serif; font-size: 16px;">Connect</div>
        <div class="links-container">
            <a href="https://midf.org.in/" target="_blank" class="menu-link">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Website
            </a>
            <a href="https://www.linkedin.com/company/midf-india/" target="_blank" class="menu-link">
                <svg viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
                LinkedIn
            </a>
            <a href="https://x.com/midf_org" target="_blank" class="menu-link">
                <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                X
            </a>
        </div>
    </div>

    <div id="top-title-bar"></div>

    <div id="ar-ui-layer">
        <div id="info-wrapper">
            <div id="info-header">
                <div id="info-title"></div>
                <div id="close-btn" onclick="closeTab()">&#10005;</div>
            </div>
            <div id="info-content"></div>
        </div>
        
        <div id="tab-group">
            <button id="btn-summary" class="tab-button" onclick="setTab('summary')">Description</button>
            <button id="btn-info" class="tab-button" onclick="setTab('info')">Metadata</button>
            <button id="btn-trans" class="tab-button" onclick="setTab('trans')">Excerpts</button>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity id="target-0" mindar-image-target="targetIndex: 0"></a-entity>

        <a-entity id="target-1" mindar-image-target="targetIndex: 1"></a-entity>

        <a-entity id="target-2" mindar-image-target="targetIndex: 2"></a-entity>
    </a-scene>

    <script>
        // --- MULTI-TARGET DATABASE ---
        const archiveDatabase = {
            target0: {
                titleName: "Vṛddhagārgīya Jyotiṣa",
                summary: { 
                    title: "DESCRIPTION", 
                    body: "Vṛddha Gārgīya Jyotiṣa is remarkable for preserving real astronomical observations from the last stretch of the Bronze Age, making it a rare window into early Indian science. Unlike later astrology, it treats jyotiṣa as a holistic natural science, covering planets, seasons, rainfall, and even earthquakes. It uniquely classifies over 100 comets, describing their cycles and linking them to events like floods and wars. The text also reflects early cosmology with the universe emerging from primordial “salila”, blending philosophy with observation. Overall, it is an evolving scientific tradition, not just an astrological text." 
                },
                info: { 
                    title: "METADATA", 
                    body: "• <strong style='color:#603b18;'>Material:</strong> Paper<br>• <strong style='color:#603b18;'>Author:</strong> Vṛddha Garga, founder of the Pre-siddhantic Jyotiṣa school named after himself<br>• <strong style='color:#603b18;'>Dating:</strong> Written in phases between 1300BCE and 500BCE<br>• <strong style='color:#603b18;'>Location:</strong> Lalchand Research Library, Chandigarh" 
                },
                trans: { 
                    title: "EXCERPTS", 
                    body: "<strong style='color:#603b18;'>Invocation</strong><br>Salutations to that Savitṛ, the Ordainer of Wisdom, the creator of the world, the destroyer of darkness, the protector of living beings, the granter of fruits, and the source of intentionality within the stream of mantra-vision.<br><br><strong style='color:#603b18;'>Theory of calendar computation (C.7 v.20)</strong><br>Thus, by observing the increase and decrease of both day and night, one should determine the measure of the seasons and months through the movement of the shadow and the sun." 
                }
            },
            target1: {
                titleName: "Mānasollāsa",
                summary: { 
                    title: "DESCRIPTION", 
                    body: "The Abhilaṣitārthacintāmaṇi or Mānasollāsa, a Sanskrit encyclopedia, covers statecraft, law, science, leisure, and daily life in five sprawling books. It instructs a king on governing provinces, organizing armies, managing espionage, and even supervising artisans and farmers. Food, aesthetics, and art receive striking attention: it records refined rice cakes (early idli‑like dishes), sweet dishes, meat curries, and spiced wines, but also rare delicacies like fried black rats for the royal table. Courtly beauty, jewelry, perfumes, clothing colours, music, dance, painting, and architecture are codified as sciences of pleasure that sustain royal dignity and emotional balance." 
                },
                info: { 
                    title: "METADATA", 
                    body: "• <strong style='color:#603b18;'>Material:</strong> Paper<br>• <strong style='color:#603b18;'>Author:</strong> Cālukyamalla Someśvaradeva Sarvajñabhūpāla, i.e. Chālukya Someśvara III<br>• <strong style='color:#603b18;'>Dating:</strong> 12th century, during the lifetime of Chālukya Someśvara III<br>• <strong style='color:#603b18;'>Location:</strong> Oriental Library, Baroda" 
                },
                trans: { 
                    title: "EXCERPTS", 
                    body: "<strong style='color:#603b18;'>Recipes (B.4, C.13):</strong><br><br><strong style='color:#603b18;'>For Polikā (now Marathi ‘pol̤ī’, Kannada ‘hōḷige’)</strong><br>Poḷikās are recommended to be eaten when they have attained a slight roast from a charcoal stove. The flour coated dough should not be moved excessively on the pan. The Poḷikās must be cooked on a well heated earthen vessel.<br><br><strong style='color:#603b18;'>For Iderikā (modern ‘Idli’) and Vaṭikā (modern ‘vada’)</strong><br>One should place fermented black gram batter into small circular molds. Having covered them with fabric, one should cook them thoroughly. After taking them down, one should then sprinkle powdered pepper over them. One should flavor it with asafoetida and ghee, and cumin. These excellent iderikā are very soothing, white, and smooth." 
                }
            },
            target2: {
                titleName: "Guḍnāpur Pillar Inscription",
                summary: { 
                    title: "DESCRIPTION", 
                    body: "The Guḍnāpur pillar of the Kadambas uniquely exalts Kāma, not Viṣṇu or Śiva, as cosmic creator, preserver, and destroyer, and centers a royal Kāma temple inside the Kadamba palace between women’s quarters and dance halls. It prescribes a flexible spring Kāma‑festival with scented breezes, bees as “smoke,” and cuckoos as love‑mediators, clearly an early vasantotsava, ancestral to Holi‑style celebrations of eros and renewal. It also names political handbooks of Viṣṇugupta (Chanakya) and Subandhu as the king’s guides, while its prose maps nine numbered brahmadeya land‑grants, tanks, and orchards, preserving the agrarian geography of early Kadamba Karnataka." 
                },
                info: { 
                    title: "METADATA", 
                    body: "• <strong style='color:#603b18;'>Material:</strong> Stone Pillar<br>• <strong style='color:#603b18;'>Commissioner:</strong> Kadamba King Ravivarma<br>• <strong style='color:#603b18;'>Dating:</strong> 5th Century CE<br>• <strong style='color:#603b18;'>Location:</strong> Gudnapur, Sirsi" 
                },
                trans: { 
                    title: "EXCERPTS", 
                    body: "<strong style='color:#603b18;'>References to the Arthaśāstra</strong><br>He, the lord, having slain the ruler Viṣṇudāsa, obtained sovereignty while still just a child adorned by its control of the 18 circles. (14)<br><br>He acquired mastery of both the political wisdom authored by Viṣṇugupta and Subandhu, which promotes the elevation of both realms, the political and the religious. (18)<br><br><strong style='color:#603b18;'>Early evidence of Holi</strong><br>This temple where the fire of Kāma—which has smoke in the form of rows of bees—will be kindled by the southern breeze, cooling, conveying joy, and which carries the scent of flowers. (25)<br><br>There, the festival was established for the Mind-Born god, who effects the creation, destruction, and maintenance of the universe, in the first month of every spring, a feast for the lotus-eyes of the people. (27)" 
                }
            }
        };

        let activeTargetId = null;

        const uiLayer = document.querySelector('#ar-ui-layer');
        const topBar = document.querySelector('#top-title-bar');
        const infoWrapper = document.querySelector('#info-wrapper');
        const titleBox = document.querySelector('#info-title');
        const box = document.querySelector('#info-content');
        const welcomeScreen = document.querySelector('#welcome-screen');
        const swipeToast = document.querySelector('#swipe-toast');
        const rightMenu = document.querySelector('#right-menu');

        window.addEventListener("load", () => { document.querySelector('#loading').style.display = 'none'; });

        function startScanner() {
            welcomeScreen.style.opacity = '0';
            setTimeout(() => { 
                welcomeScreen.style.display = 'none'; 
                swipeToast.style.opacity = '1';
                setTimeout(() => { swipeToast.style.opacity = '0'; }, 3500); 
            }, 500);
        }

        // --- TARGET DETECTION EVENT SETUP ---
        const targets = [
            document.querySelector('#target-0'),
            document.querySelector('#target-1'),
            document.querySelector('#target-2')
        ];

        targets.forEach((targetElement, index) => {
            const targetId = `target${index}`; 
            
            targetElement.addEventListener("targetFound", () => {
                activeTargetId = targetId;
                topBar.innerHTML = archiveDatabase[targetId].titleName;
                uiLayer.style.display = 'flex'; 
                topBar.style.display = 'block';
                closeTab(); 
            });

            targetElement.addEventListener("targetLost", () => {
                uiLayer.style.display = 'none'; 
                topBar.style.display = 'none'; 
                closeTab(); 
                hideMenu();
                activeTargetId = null;
            });
        });

        // --- DYNAMIC TAB LOGIC ---
        function setTab(tabType) {
            if (!activeTargetId) return; 

            infoWrapper.style.display = 'block';
            
            // Ensures the box scrolls to top when a new tab is opened
            infoWrapper.scrollTop = 0; 
            
            titleBox.innerHTML = archiveDatabase[activeTargetId][tabType].title;
            box.innerHTML = archiveDatabase[activeTargetId][tabType].body;
            
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('btn-' + tabType).classList.add('active-tab');
        }

        function closeTab() {
            infoWrapper.style.display = 'none';
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active-tab'));
        }

        // SWIPE & TAP GESTURE LOGIC
        let touchstartX = 0; let touchstartY = 0;
        let touchendX = 0; let touchendY = 0;

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
            // Prevent swipe closing when user is scrolling the text box
            if (rightMenu.style.display === 'flex' && !rightMenu.contains(e.target) && !infoWrapper.contains(e.target)) { hideMenu(); }
        });

        document.addEventListener('click', e => {
            if (rightMenu.style.display === 'flex' && !rightMenu.contains(e.target)) { hideMenu(); }
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            touchendY = e.changedTouches[0].screenY;
            handleSwipe();
        });

        function handleSwipe() {
            let xDiff = touchstartX - touchendX;
            let yDiff = touchstartY - touchendY;
            if (Math.abs(xDiff) > Math.abs(yDiff) && Math.abs(xDiff) > 60) {
                if (xDiff > 0) { showMenu(); } else { hideMenu(); }
            }
        }

        function showMenu() {
            rightMenu.style.display = 'flex';
            setTimeout(() => { rightMenu.style.opacity = '1'; }, 10);
        }

        function hideMenu() {
            rightMenu.style.opacity = '0';
            setTimeout(() => { rightMenu.style.display = 'none'; }, 300);
        }
    </script>
</body>
</html>
